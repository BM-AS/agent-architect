name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies
        run: bun install

      - name: Typecheck
        run: bun run typecheck

      - name: Build
        run: bun run build

      - name: CLI smoke test
        run: |
          node dist/cli/index.js sources list
          node dist/cli/index.js sources read karpathy-llm-wiki

      - name: Validate manifest against schema
        run: |
          node --input-type=module - <<'EOF'
          import { readFileSync } from "node:fs";
          import { SourceManifestSchema } from "./dist/schemas/source.js";
          const raw = readFileSync("knowledge/external-docs/manifest.json", "utf8");
          const result = SourceManifestSchema.safeParse(JSON.parse(raw));
          if (!result.success) {
            console.error("Manifest validation failed:", result.error.issues);
            process.exit(1);
          }
          console.log(`Manifest valid: ${result.data.sources.length} sources`);
          EOF

      - name: Verify skill references in sync
        run: |
          for file in knowledge/wiki/summaries/*.md; do
            base=$(basename "$file")
            skill_ref="skills/agent-architect/references/$base"
            if [ ! -f "$skill_ref" ]; then
              echo "MISSING: $skill_ref (exists in wiki but not in skill references)"
              exit 1
            fi
            if ! diff -q "$file" "$skill_ref" > /dev/null 2>&1; then
              echo "OUT OF SYNC: $file != $skill_ref"
              exit 1
            fi
          done
          echo "All skill references in sync with wiki summaries"
