name: Publish to ClawHub

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Publish skill to ClawHub
        run: |
          npx clawhub@latest login --token "$CLAWHUB_TOKEN" --no-browser
          npx clawhub@latest publish skills/agent-architect \
            --slug @blockmind/agent-architect \
            --name "Agent Architect" \
            --version "${{ steps.version.outputs.version }}" \
            --changelog "Release v${{ steps.version.outputs.version }}"
        env:
          CLAWHUB_TOKEN: ${{ secrets.CLAWHUB_TOKEN }}
